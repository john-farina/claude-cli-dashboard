<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent — CEO Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#121212;--bg-gradient:linear-gradient(135deg,#121212 0%,#1a1816 50%,#141210 100%);--surface:#1e1e1e;--text:#ede8e0;--text-dim:#7a7568;--accent:#c9a84c;--terminal-bg:#0e0e0d}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg);background-image:var(--bg-gradient);background-attachment:fixed;color:var(--text);min-height:100vh}
  </style>
  <link rel="stylesheet" href="style.css" id="main-css">
  <script>
    document.getElementById('main-css').onerror = function() {
      var retry = document.createElement('link');
      retry.rel = 'stylesheet';
      retry.href = 'style.css?retry=' + Date.now();
      document.head.appendChild(retry);
    };
  </script>
</head>
<body class="popout-body">
  <div class="popout-header">
    <div class="popout-header-left">
      <button id="back-btn" class="btn-secondary popout-back-btn">&#8592; Dashboard</button>
      <span id="agent-name" class="agent-name"></span>
      <span id="status-badge" class="status-badge working">working</span>
    </div>
    <div class="popout-header-right">
      <span id="workdir" class="workdir-link"></span>
      <span id="branch-info" class="branch-info"></span>
      <button id="restart-btn" class="restart-btn" title="Restart Claude">&#8635;</button>
      <button id="kill-btn" class="kill-btn" title="Kill agent">&times;</button>
    </div>
  </div>

  <div id="terminal" class="terminal" tabindex="0"></div>
  <div id="prompt-actions" class="prompt-actions"></div>
  <div id="attachment-chips" class="attachment-chips"></div>
  <div class="popout-input">
    <textarea id="input" rows="1" placeholder="Send a message..."></textarea>
    <button id="send-btn" class="send-btn">Send</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ansi_up@5.2.1/ansi_up.min.js" integrity="sha384-ZrKQ7PkfCn7dCFPHYUVgEVQl/baDI8SxCXy/rqOimlKqxI0E83ob0u9QkcMPrk5+" crossorigin="anonymous"></script>
  <script src="popout.js"></script>
</body>
</html>
